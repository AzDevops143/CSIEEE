name: SNOOPFINGER Simulation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_word:
        description: 'Target word to simulate'
        required: false
        default: 'foxenter'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_WORD: ${{ inputs.target_word }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install matplotlib numpy
        
    - name: Generate VR Dataset
      run: |
        python create_dataset.py "${TARGET_WORD:-foxenter}"
        
    - name: Run Attack/Defense Simulation
      run: |
        python main.py "${TARGET_WORD:-foxenter}"
        
    - name: Upload Simulation Results
      uses: actions/upload-artifact@v4
      with:
        name: simulation-artifacts
        path: |
          simulation_result.png
          vr_telemetry_dataset.csv
